<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Reader Dashboard</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-width: 2px;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Header chuyên nghiệp hơn */
        header {
            height: var(--header-height);
            display: flex; align-items: center;
            padding: 0 15px;
            border-bottom: var(--border-width) solid var(--text-color);
            gap: 10px;
            background: #fff;
            z-index: 100;
        }

        header input {
            flex: 1; height: 40px; border: var(--border-width) solid var(--text-color);
            padding: 0 12px; font-size: 16px; outline: none;
        }

        .btn {
            height: 40px; padding: 0 15px;
            border: var(--border-width) solid var(--text-color);
            background: #fff; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:active { background: #000; color: #fff; }

        /* Màn hình chính - Bookmark Grid */
        #home-screen {
            position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0;
            padding: 20px; overflow-y: auto; background: var(--bg-color);
            z-index: 10;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .bookmark-card {
            border: var(--border-width) solid var(--text-color);
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            background: #fff;
            box-shadow: 4px 4px 0px #000;
            word-break: break-all;
            display: flex; flex-direction: column; justify-content: center;
            min-height: 100px;
        }
        .bookmark-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .bookmark-card .title { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .bookmark-card .url { font-size: 11px; opacity: 0.6; }

        /* Vùng hiển thị Web */
        #viewer-screen {
            position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0;
            display: none; background: #fff;
        }
        #viewer-container {
            position: relative; width: 100%; height: 100%; overflow: hidden;
        }
        #web-frame {
            width: 100%; height: 300000px; /* Chiều cao cực lớn để phân trang */
            border: none; position: absolute; top: 0; left: 0;
        }

        /* Nút điều hướng */
        .nav-controls {
            position: fixed; bottom: 25px; right: 25px;
            display: none; gap: 15px; z-index: 1000;
        }
        .nav-btn {
            width: 65px; height: 65px; border-radius: 50%;
            border: 3px solid #000; background: #fff;
            font-size: 28px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 0px #000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <button class="btn" onclick="showHome()">🏠</button>
    <input type="text" id="urlInput" placeholder="Nhập địa chỉ web...">
    <button class="btn" onclick="loadWeb()">Go</button>
    <button class="btn" onclick="addBookmark()">⭐</button>
</header>

<div id="home-screen">
    <h2 style="margin-top:0">Thư viện của bạn</h2>
    <div class="grid-container" id="bookmark-grid">
        </div>
</div>

<div id="viewer-screen">
    <div id="viewer-container">
        <iframe src="" id="web-frame"></iframe>
    </div>
</div>

<div class="nav-controls" id="nav-controls">
    <div class="nav-btn" onclick="prevPage()">←</div>
    <div class="nav-btn" onclick="nextPage()">→</div>
</div>

<script>
    const DEFAULT_BOOKMARKS = [
        { title: 'WikiCV', url: 'https://wikicv.net' },
        { title: 'Wikipedia', url: 'https://vi.m.wikipedia.org' }
    ];

    let currentPage = 0;
    const frame = document.getElementById('web-frame');
    const input = document.getElementById('urlInput');
    const grid = document.getElementById('bookmark-grid');
    const homeScreen = document.getElementById('home-screen');
    const viewerScreen = document.getElementById('viewer-screen');
    const navControls = document.getElementById('nav-controls');

    window.onload = () => {
        initBookmarks();
        renderBookmarks();
    };

    function initBookmarks() {
        if (!localStorage.getItem('bookmarks')) {
            localStorage.setItem('bookmarks', JSON.stringify(DEFAULT_BOOKMARKS));
        }
    }

    function renderBookmarks() {
        const bookmarks = JSON.parse(localStorage.getItem('bookmarks'));
        grid.innerHTML = '';
        
        bookmarks.forEach((b, index) => {
            const card = document.createElement('div');
            card.className = 'bookmark-card';
            card.onclick = () => loadWeb(b.url);
            card.oncontextmenu = (e) => { // Nhấn giữ để xóa
                e.preventDefault();
                if(confirm('Xóa bookmark này?')) deleteBookmark(index);
            };
            card.innerHTML = `
                <div class="title">${b.title}</div>
                <div class="url">${b.url.replace('https://', '')}</div>
            `;
            grid.appendChild(card);
        });
    }

    function loadWeb(url = null) {
        let targetUrl = url || input.value;
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;

        input.value = targetUrl;
        frame.src = targetUrl;
        currentPage = 0;
        updateView();

        // Chuyển UI sang chế độ đọc
        homeScreen.classList.add('hidden');
        viewerScreen.style.display = 'block';
        navControls.style.display = 'flex';
    }

    function showHome() {
        homeScreen.classList.remove('hidden');
        viewerScreen.style.display = 'none';
        navControls.style.display = 'none';
        frame.src = ""; // Tiết kiệm tài nguyên
    }

    function addBookmark() {
        const url = input.value;
        if (!url) return;
        
        const title = prompt("Nhập tên gợi nhớ:", "Trang mới");
        if (title) {
            let bookmarks = JSON.parse(localStorage.getItem('bookmarks'));
            bookmarks.push({ title, url });
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
        }
    }

    function deleteBookmark(index) {
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks'));
        bookmarks.splice(index, 1);
        localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        renderBookmarks();
    }

    // Phân trang
    function nextPage() { currentPage++; updateView(); }
    function prevPage() { if (currentPage > 0) currentPage--; updateView(); }

    function updateView() {
        const vh = document.getElementById('viewer-container').offsetHeight;
        frame.style.top = -(currentPage * vh) + "px";
        window.scrollTo(0,0);
    }

    // Phím cứng cho máy đọc sách (Nút âm lượng/Nút chuyển trang)
    document.addEventListener('keydown', (e) => {
        if (viewerScreen.style.display === 'block') {
            if (e.key === "ArrowRight" || e.key === "PageDown") nextPage();
            if (e.key === "ArrowLeft" || e.key === "PageUp") prevPage();
        }
    });
</script>

</body>
</html>
