<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Reader Ultimate</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: 2px solid #000;
            --header-h: 55px;
            --footer-h: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: serif; overflow: hidden; display: flex; flex-direction: column;
        }

        /* 1. Header */
        header {
            height: var(--header-h); display: flex; align-items: center;
            padding: 0 8px; border-bottom: var(--border);
            gap: 6px; background: #fff; z-index: 100; flex-shrink: 0;
        }
        input { flex: 1; height: 35px; border: var(--border); padding: 0 8px; font-size: 14px; outline: none; }
        .btn-ui { padding: 0px 5px 0px 5px; min-width: 38px; height: 38px; border: var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; background: #fff; font-size: 18px; }

        /* 2. Main Content Area */
        main { flex-grow: 1; position: relative; overflow: hidden; background: #fff; }

        #home-screen {
            position: absolute; inset: 0; background: #fff; z-index: 20;
            padding: 15px; overflow-y: auto;
        }

        /* TĂNG KÍCH CỠ BOOKMARK CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .card {
            border: var(--border); padding: 10px; text-align: center; font-size: 13px;
            font-weight: bold; cursor: pointer; background: #fff; min-height: 65px;
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 4px 4px 0 #000;
        }
        .card:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        #reader-screen { display: none; width: 100%; height: 100%; overflow: hidden; position: relative; }

        /* TEXT ĐEN TUYỆT ĐỐI & NỀN TRẮNG */
        #content-area {
            width: 100%; padding: 20px; line-height: 1.8; font-size: 21px;
            position: absolute; top: 0; left: 0;
        }
        #content-area, #content-area * {
            color: #000000 !important;
            background-color: transparent !important;
            max-width: 100% !important;
        }
        #content-area a { border: 1px solid #000; padding: 2px 6px; margin: 3px; display: inline-block; text-decoration: none; font-weight: bold; }

        /* 3. Footer Điều hướng thông minh */
        footer {
            height: var(--footer-h); display: none; border-top: var(--border);
            background: #fff; justify-content: flex-end; align-items: center;
            padding: 0 15px; gap: 10px; flex-shrink: 0;
        }
		.nav-group {
			margin-right: 10px;
			display: flex;
		}
        .nav-btn {
            width: 55px; height: 55px; border-radius: 50%; border: var(--border);
            background: #fff; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0 #000;
        }
        .small-btn { margin-right: 10px; }

        #loader { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 999; background: white; padding: 20px; border: 3px solid #000; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loader">ĐANG TẢI...</div>

<header>
    <div class="btn-ui" onclick="showHome()">Trang Chủ</div>
    <div class="btn-ui" onclick="goBack()" title="Quay lại">Trở Lại</div>
    <input type="text" id="urlInput" placeholder="Dán link">
    <div class="btn-ui" onclick="fetchContent()">Đi</div>
    <div class="btn-ui" onclick="addBM()">Lưu</div>
</header>

<main>
    <div id="home-screen">
        <h3 style="margin: 0 0 15px 0; border-bottom: 2px solid #000;">THƯ VIỆN</h3>
        <div class="grid" id="bm-grid"></div>
    </div>

    <div id="reader-screen">
        <div id="content-area"></div>
    </div>
</main>

<footer id="main-footer">
    <div id="page-label" style="margin-right: auto; font-size: 13px; font-weight: bold;">Trang 1</div>
    
    <div class="nav-group">
		<button class="nav-btn small-btn" onclick="scrollToTop()">Top</button>
		<button class="nav-btn small-btn" onclick="scrollToBottom()">End</button>
	</div>

    <button class="nav-btn" onclick="prevPage()">↑</button>
    <button class="nav-btn" onclick="nextPage()">↓</button>
</footer>

<script>
    const contentArea = document.getElementById('content-area');
    const input = document.getElementById('urlInput');
    const grid = document.getElementById('bm-grid');
    const home = document.getElementById('home-screen');
    const reader = document.getElementById('reader-screen');
    const footer = document.getElementById('main-footer');
    const loader = document.getElementById('loader');
    const label = document.getElementById('page-label');

    let currentPage = 0;
    let historyStack = [];
    const BM_KEY = 'e_reader_ultimate_v1';

    const DEFAULT_BM = [
        { title: 'WikiCV', url: 'https://wikicv.net' },
        { title: 'Wikipedia', url: 'https://vi.wikipedia.org' }
    ];

    window.onload = () => {
        const stored = localStorage.getItem(BM_KEY);
        if (!stored) localStorage.setItem(BM_KEY, JSON.stringify(DEFAULT_BM));
        renderBM();
    };

    async function fetchContent(url = null, isBack = false) {
        let target = url || input.value;
        if (!target) return;
        if (!target.startsWith('http')) target = 'https://' + target;
        
        // Lưu lịch sử nếu không phải là nút Back
        if (!isBack && input.value && input.value !== target) {
            historyStack.push(input.value);
        }

        loader.style.display = 'block';
        input.value = target;

        try {
            const proxyUrl = `https://dawn-sky-95e5.aulpixman.workers.dev/?url=${encodeURIComponent(target)}`;
            const response = await fetch(proxyUrl);
            const data = await response.text();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data, 'text/html');
            const urlObj = new URL(target);
            const baseURL = urlObj.origin;

            let main = doc.querySelector('article') || doc.querySelector('#chapter-content') || doc.querySelector('.content') || doc.body;
            contentArea.innerHTML = `<h2>${doc.title}</h2>` + main.innerHTML;
            
            // Dọn rác
            contentArea.querySelectorAll('script, style, iframe, nav, footer, header, .ads, button').forEach(el => el.remove());

            // Xử lý link để tải tiếp trong app
            contentArea.querySelectorAll('a').forEach(link => {
                let href = link.getAttribute('href');
                if (href) {
                    if (href.startsWith('/')) href = baseURL + href;
                    else if (!href.startsWith('http')) {
                        const p = target.split('/'); p.pop(); href = p.join('/') + '/' + href;
                    }
                    link.onclick = (e) => { e.preventDefault(); fetchContent(href); };
                }
            });
			
			// Xử lý tất cả các Form để tải trong app
			contentArea.querySelectorAll('form').forEach(form => {
				form.onsubmit = (e) => {
					e.preventDefault(); // Chặn trình duyệt load lại trang
			
					// 1. Lấy phương thức (GET hoặc POST) và URL đích
					const method = (form.getAttribute('method') || 'GET').toUpperCase();
					let action = form.getAttribute('action') || target; // target là URL hiện tại
			
					// 2. Xử lý URL tương đối/tuyệt đối (giống logic thẻ <a> của bạn)
					if (action.startsWith('/')) action = baseURL + action;
					else if (!action.startsWith('http')) {
						const p = target.split('/'); p.pop(); action = p.join('/') + '/' + action;
					}
			
					// 3. Thu thập dữ liệu từ các input trong form
					const formData = new FormData(form);
					const params = new URLSearchParams(formData).toString();
			
					if (method === 'GET') {
						// Nếu là GET, nối query string vào URL
						const finalURL = action.includes('?') ? `${action}&${params}` : `${action}?${params}`;
						fetchContent(finalURL);
					} else {
						// Nếu là POST, bạn cần truyền thêm tham số vào hàm fetchContent của bạn
						// Giả sử fetchContent(url, options) hỗ trợ nhận object cấu hình:
						fetchContent(action, {
							method: 'POST',
							body: formData
						});
					}
				};
			});

            currentPage = 0;
            home.style.display = 'none';
            reader.style.display = 'block';
            footer.style.display = 'flex';
            updateView();
        } catch (e) { alert("Lỗi tải trang."); }
        finally { loader.style.display = 'none'; }
    }

    function goBack() {
        if (historyStack.length > 0) {
            const lastUrl = historyStack.pop();
            fetchContent(lastUrl, true);
        } else {
            showHome();
        }
    }

    function showHome() {
        home.style.display = 'block';
        reader.style.display = 'none';
        footer.style.display = 'none';
        historyStack = [];
    }

    function scrollToTop() { currentPage = 0; updateView(); }
    function scrollToBottom() {
        const viewH = reader.offsetHeight;
        const totalH = contentArea.offsetHeight;
        currentPage = Math.floor(totalH / (viewH - 60));
        updateView();
    }

    function nextPage() { currentPage++; updateView(); }
    function prevPage() { if (currentPage > 0) currentPage--; updateView(); }

    function updateView() {
        const viewH = reader.offsetHeight;
        const offset = currentPage * (viewH - 60);
        contentArea.style.top = -offset + "px";
        label.innerText = "Trang " + (currentPage + 1);
    }

    function renderBM() {
        const bms = JSON.parse(localStorage.getItem(BM_KEY));
        grid.innerHTML = '';
        bms.forEach((b, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = b.title;
            div.onclick = () => fetchContent(b.url);
            div.oncontextmenu = (e) => { 
                e.preventDefault(); 
                if(confirm('Xóa?')) { bms.splice(i,1); localStorage.setItem(BM_KEY, JSON.stringify(bms)); renderBM(); } 
            };
            grid.appendChild(div);
        });
    }

    function addBM() {
        const url = input.value;
        const title = prompt("Tên dấu trang:");
        if (title && url) {
            let bms = JSON.parse(localStorage.getItem(BM_KEY));
            bms.push({title, url});
            localStorage.setItem(BM_KEY, JSON.stringify(bms));
            renderBM();
        }
    }
</script>
</body>
</html>
