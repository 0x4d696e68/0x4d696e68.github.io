<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Reader Optimized</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-width: 2px;
            --header-h: 50px;
            --footer-h: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Header */
        header {
            height: var(--header-h); display: flex; align-items: center;
            padding: 0 8px; border-bottom: var(--border-width) solid #000;
            gap: 6px; flex-shrink: 0; background: #fff; z-index: 100;
        }
        input { flex: 1; height: 32px; border: var(--border-width) solid #000; padding: 0 8px; font-size: 14px; }

        /* Main Area */
        main { flex-grow: 1; position: relative; overflow: hidden; }

        #home-screen {
            position: absolute; inset: 0; background: #fff; z-index: 10;
            padding: 12px; overflow-y: auto;
        }

        /* Grid Bookmark nhỏ gọn như v1 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 10px; 
        }
        .card {
            border: var(--border-width) solid #000; padding: 8px;
            text-align: center; font-size: 13px; font-weight: bold;
            cursor: pointer; background: #fff; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 2px 0 #000;
        }
        .card:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #000; }

        /* Viewer & Iframe */
        #viewer-screen { display: none; width: 100%; height: 100%; position: relative; }
        
        #iframe-container {
            width: 100%; height: 100%; overflow: hidden; position: relative;
        }
        
        iframe {
            width: 100%; 
            height: 1000000px; /* Chiều cao giả định cực lớn */
            border: none; position: absolute; top: 0; left: 0;
            background: #fff;
        }

        /* Footer Buttons */
        footer {
            height: var(--footer-h); display: none;
            border-top: var(--border-width) solid #000; background: #fff;
        }
        .nav-btn {
            flex: 1; border: none; background: transparent;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .nav-btn:first-child { border-right: var(--border-width) solid #000; }
        .nav-btn:active { background: #000; color: #fff; }

        .btn-ui {
            width: 34px; height: 34px; border: var(--border-width) solid #000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Fullscreen tweak */
        :fullscreen header, :fullscreen footer { display: none; }
        :fullscreen main { height: 100vh; }
    </style>
</head>
<body>

<header>
    <div class="btn-ui" onclick="showHome()">🏠</div>
    <input type="text" id="urlInput" placeholder="Địa chỉ web...">
    <div class="btn-ui" onclick="loadWeb()">Go</div>
    <div class="btn-ui" onclick="toggleFS()">⛶</div>
    <div class="btn-ui" onclick="addBM()">⭐</div>
</header>

<main>
    <div id="home-screen">
        <h4 style="margin: 0 0 10px 0;">THƯ VIỆN</h4>
        <div class="grid" id="bm-grid"></div>
    </div>

    <div id="viewer-screen">
        <div id="iframe-container">
            <iframe src="" id="web-frame"></iframe>
        </div>
    </div>
</main>

<footer id="main-footer">
    <button class="nav-btn" onclick="prevPage()"> Trang trước </button>
    <button class="nav-btn" onclick="nextPage()"> Trang sau </button>
</footer>

<script>
    const frame = document.getElementById('web-frame');
    const input = document.getElementById('urlInput');
    const grid = document.getElementById('bm-grid');
    const home = document.getElementById('home-screen');
    const viewer = document.getElementById('viewer-screen');
    const footer = document.getElementById('main-footer');

    let currentPage = 0;

    // Danh sách mặc định
    const DEFAULT_BM = [
        { title: 'WikiCV', url: 'https://wikicv.net' },
        { title: 'Wikipedia', url: 'https://vi.m.wikipedia.org' }
    ];

    window.onload = () => {
        if (!localStorage.getItem('bms_v3')) {
            localStorage.setItem('bms_v3', JSON.stringify(DEFAULT_BM));
        }
        renderBM();
    };

    // TỰ ĐỘNG CUỘN LÊN ĐẦU KHI NHẤN LINK TRONG IFRAME
    frame.onload = () => {
        if (frame.src !== "about:blank" && frame.src !== "") {
            currentPage = 0;
            updateView();
        }
    };

    function renderBM() {
        const bms = JSON.parse(localStorage.getItem('bms_v3'));
        grid.innerHTML = '';
        bms.forEach((b, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = b.title;
            div.onclick = () => loadWeb(b.url);
            div.oncontextmenu = (e) => { e.preventDefault(); if(confirm('Xóa?')) deleteBM(i); };
            grid.appendChild(div);
        });
    }

    function loadWeb(url = null) {
        let target = url || input.value;
        if (!target) return;
        if (!target.startsWith('http')) target = 'https://' + target;
        
        input.value = target;
        frame.src = target;
        
        home.style.display = 'none';
        viewer.style.display = 'block';
        footer.style.display = 'flex';
    }

    function showHome() {
        home.style.display = 'block';
        viewer.style.display = 'none';
        footer.style.display = 'none';
        frame.src = 'about:blank';
    }

    function nextPage() { currentPage++; updateView(); }
    function prevPage() { if (currentPage > 0) currentPage--; updateView(); }

    function updateView() {
        const viewH = document.getElementById('iframe-container').offsetHeight;
        
        /* Gối đầu (Overlap): Cuộn ít hơn 40px so với chiều cao vùng nhìn.
           40px đủ để đảm bảo bất kỳ dòng chữ nào bị cắt ở cuối trang cũ
           sẽ luôn hiện đầy đủ ở đầu trang mới.
        */
        const overlap = 40; 
        const offset = currentPage * (viewH - overlap);
        
        frame.style.top = -offset + "px";
        window.scrollTo(0,0);
    }

    function addBM() {
        const url = input.value;
        if (!url) return;
        const title = prompt("Tên dấu trang:", "Trang mới");
        if (title) {
            let bms = JSON.parse(localStorage.getItem('bms_v3'));
            bms.push({title, url});
            localStorage.setItem('bms_v3', JSON.stringify(bms));
            renderBM();
        }
    }

    function deleteBM(index) {
        let bms = JSON.parse(localStorage.getItem('bms_v3'));
        bms.splice(index, 1);
        localStorage.setItem('bms_v3', JSON.stringify(bms));
        renderBM();
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    window.onresize = updateView;

    // Phím cứng chuyển trang
    document.addEventListener('keydown', (e) => {
        if (e.key === "PageDown" || e.key === "ArrowRight") nextPage();
        if (e.key === "PageUp" || e.key === "ArrowLeft") prevPage();
    });
</script>

</body>
</html>
