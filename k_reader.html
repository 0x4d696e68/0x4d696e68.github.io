<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Reader Sharp Black</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: 2px solid #000;
            --header-h: 50px;
            --footer-h: 75px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 1. Header */
        header {
            height: var(--header-h); display: flex; align-items: center;
            padding: 0 8px; border-bottom: var(--border);
            gap: 6px; background: #fff; z-index: 100;
        }
        input { flex: 1; height: 32px; border: var(--border); padding: 0 8px; font-size: 14px; outline: none; }
        .btn-ui { width: 34px; height: 34px; border: var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }

        /* 2. Main Content Area */
        main { flex-grow: 1; position: relative; overflow: hidden; }

        #home-screen {
            position: absolute; inset: 0; background: #fff; z-index: 20;
            padding: 12px; overflow-y: auto;
        }

        /* Bookmark Grid nhỏ gọn (v1 style) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 8px; 
        }
        .card {
            border: var(--border); padding: 5px; text-align: center;
            font-size: 11px; font-weight: bold; cursor: pointer;
            background: #fff; min-height: 45px; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 2px 2px 0 #000;
        }

        #viewer-screen { display: none; width: 100%; height: 100%; position: relative; }
        
        /* CÔNG NGHỆ ÉP CHỮ ĐEN NHƯNG RÕ NÉT */
        #iframe-wrapper {
            width: 100%; height: 100%; overflow: hidden; position: relative;
            /* grayscale: bỏ màu, brightness: hạ độ sáng để chữ xám thành đen, contrast: tăng nhẹ để tách bạch chữ và nền */
            filter: grayscale(1) brightness(0.7) contrast(1.8);
            /* Giúp font chữ hiển thị sắc nét hơn trên trình duyệt */
            text-rendering: optimizeLegibility;
        }
        
        iframe {
            width: 100%; height: 1000000px; border: none;
            position: absolute; top: 0; left: 0; background: #fff;
        }

        /* 3. Footer điều hướng 1 tay (Không đè chữ) */
        footer {
            height: var(--footer-h);
            display: none; 
            border-top: var(--border);
            background: #fff;
            justify-content: flex-end; /* Nút nằm bên phải */
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .nav-btn {
            width: 55px; height: 55px; border-radius: 50%;
            border: var(--border); background: #fff;
            font-size: 22px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0 #000;
        }
        .nav-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        /* Fullscreen: Tối ưu không gian đọc */
        :fullscreen header { display: none; }
        :fullscreen main { height: calc(100vh - var(--footer-h)); }
    </style>
</head>
<body>

<header>
    <div class="btn-ui" onclick="showHome()">🏠</div>
    <input type="text" id="urlInput" placeholder="URL...">
    <div class="btn-ui" onclick="loadWeb()">Go</div>
    <div class="btn-ui" onclick="toggleFS()">⛶</div>
    <div class="btn-ui" onclick="addBM()">⭐</div>
</header>

<main>
    <div id="home-screen">
        <h5 style="margin: 0 0 10px 0;">THƯ VIỆN</h5>
        <div class="grid" id="bm-grid"></div>
    </div>

    <div id="viewer-screen">
        <div id="iframe-wrapper">
            <iframe src="" id="web-frame"></iframe>
        </div>
    </div>
</main>

<footer id="main-footer">
    <div id="page-label" style="margin-right: auto; font-size: 12px; font-weight: bold;">P. 1</div>
    <button class="nav-btn" onclick="prevPage()">↑</button>
    <button class="nav-btn" onclick="nextPage()">↓</button>
</footer>

<script>
    const frame = document.getElementById('web-frame');
    const input = document.getElementById('urlInput');
    const grid = document.getElementById('bm-grid');
    const home = document.getElementById('home-screen');
    const viewer = document.getElementById('viewer-screen');
    const footer = document.getElementById('main-footer');
    const label = document.getElementById('page-label');

    let currentPage = 0;
    const DEFAULT_BM = [
        { title: 'WikiCV', url: 'https://wikicv.net' },
        { title: 'Wikipedia', url: 'https://vi.m.wikipedia.org' }
    ];

    window.onload = () => {
        if (!localStorage.getItem('bms_v6')) localStorage.setItem('bms_v6', JSON.stringify(DEFAULT_BM));
        renderBM();
    };

    frame.onload = () => {
        if (frame.src !== "about:blank" && frame.src !== "") {
            currentPage = 0;
            updateView();
        }
    };

    function renderBM() {
        const bms = JSON.parse(localStorage.getItem('bms_v6'));
        grid.innerHTML = '';
        bms.forEach((b, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = b.title;
            div.onclick = () => loadWeb(b.url);
            div.oncontextmenu = (e) => { e.preventDefault(); if(confirm('Xóa?')) deleteBM(i); };
            grid.appendChild(div);
        });
    }

    function loadWeb(url = null) {
        let target = url || input.value;
        if (!target) return;
        if (!target.startsWith('http')) target = 'https://' + target;
        input.value = target;
        frame.src = target;
        home.style.display = 'none';
        viewer.style.display = 'block';
        footer.style.display = 'flex';
    }

    function showHome() {
        home.style.display = 'block';
        viewer.style.display = 'none';
        footer.style.display = 'none';
        frame.src = 'about:blank';
    }

    function nextPage() { currentPage++; updateView(); }
    function prevPage() { if (currentPage > 0) currentPage--; updateView(); }

    function updateView() {
        const viewH = document.getElementById('iframe-wrapper').offsetHeight;
        // Overlap 50px (khoảng 2-3 dòng chữ) để đảm bảo không mất chữ khi lật trang
        const overlap = 50; 
        const offset = currentPage * (viewH - overlap);
        
        frame.style.top = -offset + "px";
        label.innerText = "P. " + (currentPage + 1);
        window.scrollTo(0,0);
    }

    function addBM() {
        const url = input.value;
        if (!url) return;
        const title = prompt("Tên dấu trang:", "Trang mới");
        if (title) {
            let bms = JSON.parse(localStorage.getItem('bms_v6'));
            bms.push({title, url});
            localStorage.setItem('bms_v6', JSON.stringify(bms));
            renderBM();
        }
    }

    function deleteBM(index) {
        let bms = JSON.parse(localStorage.getItem('bms_v6'));
        bms.splice(index, 1);
        localStorage.setItem('bms_v6', JSON.stringify(bms));
        renderBM();
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    window.onresize = updateView;

    document.addEventListener('keydown', (e) => {
        if (e.key === "PageDown" || e.key === "ArrowRight") nextPage();
        if (e.key === "PageUp" || e.key === "ArrowLeft") prevPage();
    });
</script>

</body>
</html>
